name: OCI A1 Instance Provisioner

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: oci-provision
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI credentials
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=/home/runner/.oci/key.pem\n' \
            "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" > ~/.oci/config
          printf '%s' "$OCI_KEY_PEM" > ~/.oci/key.pem
          chmod 600 ~/.oci/config
          chmod 600 ~/.oci/key.pem
          echo "--- OCI config written (secrets redacted) ---"
          sed 's/=.*/=***/' ~/.oci/config
        env:
          OCI_USER_OCID:   ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION:      ${{ secrets.OCI_REGION }}
          OCI_KEY_PEM:     ${{ secrets.OCI_KEY_PEM }}

      - name: Attempt provisioning
        id: provision
        run: bash provision.sh
        env:
          COMPARTMENT_ID:       ${{ secrets.OCI_COMPARTMENT_ID }}
          SUBNET_ID:            ${{ secrets.OCI_SUBNET_ID }}
          IMAGE_ID:             ${{ secrets.OCI_IMAGE_ID }}
          SSH_PUBLIC_KEY:       ${{ secrets.SSH_PUBLIC_KEY }}
          AVAILABILITY_DOMAINS: ${{ secrets.OCI_AVAILABILITY_DOMAINS }}
        continue-on-error: true

      - name: Notify and disable on success
        if: steps.provision.outputs.result == 'success'
        run: |
          gh issue create \
            --title "OCI A1 Instance Provisioned" \
            --body "$(printf 'Your Ampere A1 instance is live.\n\nFind the public IP in the OCI Console:\nCompute > Instances > pmtradingbot > Instance Information > Public IP\n\nThis workflow has been disabled automatically.')"
          gh workflow disable provision.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Fail on unexpected errors
        if: steps.provision.outputs.result == 'error'
        run: |
          echo "Unexpected OCI error — check the logs above"
          exit 1
